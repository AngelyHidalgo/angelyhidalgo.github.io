<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angely Hidalgo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --olive: #7a8c5c;
    --moss: #4a5c3a;
    --blush: #e8c4c0;
    --blush-light: #f5e6e4;
    --cappuccino: #a07850;
    --cappuccino-light: #c9a882;
    --cream: #f7f3ee;
    --warm-white: #faf8f5;
    --text-dark: #2e2a26;
    --text-mid: #6b5f54;
    --text-light: #9a8e84;
  }

  html, body {
    min-height: 100vh;
    background-color: var(--warm-white);
    font-family: 'Jost', sans-serif;
  }

  body {
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(122,140,92,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(160,120,80,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 60% 40%, rgba(232,196,192,0.12) 0%, transparent 50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 64px;
  }

  .container {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Avatar */
  .avatar-wrap {
    position: relative;
    width: 96px;
    height: 96px;
    margin-bottom: 20px;
  }

  .avatar-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1.5px solid var(--cappuccino-light);
    opacity: 0.7;
  }

  .avatar-inner {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blush) 0%, var(--cappuccino-light) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    color: #fff;
    letter-spacing: 2px;
  }

  /* Header text */
  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--text-dark);
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.2;
  }

  .tagline {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--cappuccino);
    margin-top: 6px;
    text-align: center;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--cappuccino-light), transparent);
    margin: 20px auto 28px;
  }

  /* Links */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    padding: 18px 22px;
    text-decoration: none;
    border-radius: 14px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s ease;
    border-radius: 14px;
    background: rgba(255,255,255,0.15);
  }

  .link-btn:hover {
    transform: translateY(-2px);
  }

  .link-btn:hover::before {
    opacity: 1;
  }

  .link-btn:active {
    transform: translateY(0px) scale(0.99);
  }

  /* Variante 1 — Tienda */
  .btn-shop {
    background-color: var(--moss);
    border: 1px solid rgba(122,140,92,0.3);
  }

  /* Variante 2 — Cuestionario */
  .btn-form {
    background-color: var(--cream);
    border: 1px solid var(--cappuccino-light);
  }

  /* Variante 3 — Behance */
  .btn-behance {
    background-color: var(--blush-light);
    border: 1px solid rgba(232,196,192,0.8);
  }

  .btn-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-shop .btn-icon { background: rgba(255,255,255,0.15); }
  .btn-form .btn-icon { background: rgba(160,120,80,0.12); }
  .btn-behance .btn-icon { background: rgba(160,120,80,0.1); }

  .btn-icon svg {
    width: 18px;
    height: 18px;
  }

  .btn-shop .btn-icon svg { stroke: #fff; fill: none; }
  .btn-form .btn-icon svg { stroke: var(--cappuccino); fill: none; }
  .btn-behance .btn-icon svg { stroke: var(--text-mid); fill: none; }

  .btn-text {
    flex: 1;
  }

  .btn-label {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 2px;
  }

  .btn-shop .btn-label { color: rgba(255,255,255,0.7); }
  .btn-form .btn-label { color: var(--text-light); }
  .btn-behance .btn-label { color: var(--text-light); }

  .btn-title {
    font-size: 16px;
    font-weight: 400;
    display: block;
  }

  .btn-shop .btn-title { color: #fff; }
  .btn-form .btn-title { color: var(--text-dark); }
  .btn-behance .btn-title { color: var(--text-dark); }

  .btn-arrow {
    opacity: 0.5;
    font-size: 18px;
    flex-shrink: 0;
  }

  .btn-shop .btn-arrow { color: #fff; }
  .btn-form .btn-arrow { color: var(--cappuccino); }
  .btn-behance .btn-arrow { color: var(--text-mid); }

  /* Footer */
  .footer {
    margin-top: 40px;
    text-align: center;
  }

  .footer-text {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-light);
    font-weight: 300;
  }

  .footer-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 10px;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }

  .dot-1 { background: var(--olive); opacity: 0.5; }
  .dot-2 { background: var(--blush); opacity: 0.7; }
  .dot-3 { background: var(--cappuccino-light); opacity: 0.5; }

  /* Entrance animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .avatar-wrap { animation: fadeUp 0.6s ease both; }
  .name { animation: fadeUp 0.6s 0.1s ease both; }
  .tagline { animation: fadeUp 0.6s 0.15s ease both; }
  .divider { animation: fadeUp 0.6s 0.2s ease both; }
  .link-btn:nth-child(1) { animation: fadeUp 0.6s 0.25s ease both; }
  .link-btn:nth-child(2) { animation: fadeUp 0.6s 0.35s ease both; }
  .link-btn:nth-child(3) { animation: fadeUp 0.6s 0.45s ease both; }
  .footer { animation: fadeUp 0.6s 0.55s ease both; }
</style>
</head>
<body>
<div class="container">

  <div class="avatar-wrap">
    <div class="avatar-ring"></div>
    <div class="avatar-inner">AH</div>
  </div>

  <h1 class="name">Angely Hidalgo</h1>
  <p class="tagline">Designer &amp; Papelaria Personalizada</p>

  <div class="divider"></div>

  <div class="links">

    <!-- Tienda -->
    <a href="https://angelyhidalgodesigner.lojavirtualnuvem.com.br" class="link-btn btn-shop" target="_blank">
      <div class="btn-icon">
        <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
      </div>
      <div class="btn-text">
        <span class="btn-label">Tienda</span>
        <span class="btn-title">Mis Productos</span>
      </div>
      <span class="btn-arrow">→</span>
    </a>

    <!-- Cuestionario -->
    <a href="https://forms.google.com" class="link-btn btn-form" target="_blank">
      <div class="btn-icon">
        <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <line x1="10" y1="9" x2="8" y2="9"/>
        </svg>
      </div>
      <div class="btn-text">
        <span class="btn-label">Clientes</span>
        <span class="btn-title">Cuestionario de Proyecto</span>
      </div>
      <span class="btn-arrow">→</span>
    </a>

    <!-- Behance -->
    <a href="https://www.behance.net/angelyhidalgo" class="link-btn btn-behance" target="_blank">
      <div class="btn-icon">
        <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="10" height="10" rx="2"/>
          <path d="M12 11c0-2.2 1.8-4 4-4h2a2 2 0 0 1 2 2v2h-6"/>
          <path d="M14 17h4a2 2 0 0 0 0-4h-6"/>
          <line x1="15" y1="4" x2="20" y2="4"/>
        </svg>
      </div>
      <div class="btn-text">
        <span class="btn-label">Portafolio</span>
        <span class="btn-title">Ver mi trabajo en Behance</span>
      </div>
      <span class="btn-arrow">→</span>
    </a>

  </div>

  <div class="footer">
    <p class="footer-text">Branding · Logotipos · Papelaria</p>
    <div class="footer-dots">
      <div class="dot dot-1"></div>
      <div class="dot dot-2"></div>
      <div class="dot dot-3"></div>
    </div>
  </div>

</div>
</body>
</html>
